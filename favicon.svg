<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 64 64">
  <defs>
    <linearGradient id="bg" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" style="stop-color:#0a0a1a"/>
      <stop offset="100%" style="stop-color:#1a0a2e"/>
    </linearGradient>
    <linearGradient id="vgrad" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" style="stop-color:#00f0ff"/>
      <stop offset="50%" style="stop-color:#7b2fff"/>
      <stop offset="100%" style="stop-color:#ff2f7b"/>
    </linearGradient>
    <filter id="glow">
      <feGaussianBlur stdDeviation="2" result="blur"/>
      <feMerge>
        <feMergeNode in="blur"/>
        <feMergeNode in="SourceGraphic"/>
      </feMerge>
    </filter>
  </defs>
  <rect width="64" height="64" rx="16" fill="url(#bg)"/>
  <!-- Outer glow ring -->
  <circle cx="32" cy="32" r="26" fill="none" stroke="url(#vgrad)" stroke-width="1.5" opacity="0.3"/>
  <!-- V letter as a stylized path -->
  <path d="M18 16 L32 50 L46 16" fill="none" stroke="url(#vgrad)" stroke-width="5" stroke-linecap="round" stroke-linejoin="round" filter="url(#glow)"/>
  <!-- Decorative dot at the bottom of V -->
  <circle cx="32" cy="52" r="2.5" fill="#00f0ff" opacity="0.8"/>
</svg>
